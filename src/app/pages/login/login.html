<div class="min-h-screen bg-muted flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-md w-full">

        <div class="bg-white rounded-xl shadow-lg p-8">

            <!-- Logo -->
            <div class="text-center mb-8">
                <h1 class="text-3xl text-primary mb-2">IRRITERRA</h1>

                <h2 class="text-2xl">
                    {{ t('Iniciar sesión', 'Sign in') }}
                </h2>

                <p class="text-gray-600 mt-2">
                    {{ t('Acceso para personal de la empresa', 'Access for company staff') }}
                </p>
            </div>

            <!-- FORM -->
            <form (ngSubmit)="handleSubmit()" class="space-y-6">

                <!-- EMAIL -->
                <div>
                    <label class="block mb-2 text-gray-700">
                        {{ t('Correo', 'Email') }}
                    </label>

                    <div class="relative">
                        <lucide-angular [img]="Mail"
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></lucide-angular>

                        <input type="email" [(ngModel)]="formData.correo" name="correo" required
                            class="w-full pl-12 pr-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary"
                            [placeholder]="t('tu@correo.com', 'your@email.com')" />
                    </div>
                </div>

                <!-- PASSWORD -->
                <div>
                    <label class="block mb-2 text-gray-700">
                        {{ t('Contraseña', 'Password') }}
                    </label>

                    <div class="relative">
                        <lucide-icon [img]="Lock"
                            class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></lucide-icon>

                        <input type="password" [(ngModel)]="formData.contrasena" name="contrasena" required
                            class="w-full pl-12 pr-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary"
                            placeholder="••••••••" />
                    </div>
                </div>

                <!-- CHECKBOX + LINK -->
                <div class="flex items-center justify-between">

                    <label class="flex items-center">
                        <input type="checkbox" class="mr-2" />
                        <span class="text-sm text-gray-600">
                            {{ t('Recordarme', 'Remember me') }}
                        </span>
                    </label>

                    <a href="#" class="text-sm text-primary hover:text-primary/80">
                        {{ t('¿Olvidó su contraseña?', 'Forgot password?') }}
                    </a>

                </div>

                <!-- BUTTON -->
                <button type="submit"
                    class="w-full px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors">
                    {{ t('Iniciar sesión', 'Sign in') }}
                </button>

            </form>

            <!-- FOOTER -->
            <div class="mt-8 pt-6 border-t border-gray-200 text-center text-sm text-gray-600">
                {{ t(
                'Este sistema es solo para personal autorizado',
                'This system is for authorized personnel only'
                ) }}
            </div>

        </div>
    </div>
</div>
