<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">

    <div class="bg-white rounded-xl p-8 w-full max-w-2xl">

        <h2 class="text-2xl mb-6">
            {{ editMode ? 'Editar usuario' : 'Crear usuario' }}
        </h2>

        <form class="space-y-4" (ngSubmit)="save()">

            <input type="text" placeholder="Nombre" [(ngModel)]="form.nombre" name="nombre"
                class="w-full px-4 py-2 border rounded-lg" />

            <input type="email" placeholder="Email" [(ngModel)]="form.email" name="email"
                class="w-full px-4 py-2 border rounded-lg" />

            <select [(ngModel)]="form.rol" name="rol" class="w-full px-4 py-2 border rounded-lg">
                <option>Vendedor</option>
                <option>Supervisor</option>
                <option>Administrador</option>
            </select>

            @if (!editMode) {
            <input type="password" placeholder="Contraseña" [(ngModel)]="form.password" name="password"
                class="w-full px-4 py-2 border rounded-lg" />
            }

            <div class="flex justify-end gap-4 mt-6">

                <button type="button" (click)="close.emit()" class="px-4 py-2 border rounded-lg">
                    Cancelar
                </button>

                <button type="submit" class="px-4 py-2 bg-primary text-white rounded-lg">
                    Guardar
                </button>

            </div>

        </form>

    </div>

</div>
