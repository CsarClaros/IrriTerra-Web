<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">

    <div class="bg-white rounded-xl p-8 w-full max-w-2xl">

        <h2 class="text-2xl mb-6">
            Editar usuario
        </h2>

        <form class="space-y-4" (ngSubmit)="save()">

            <!-- Nombre -->
            <input type="text" placeholder="Nombre" [(ngModel)]="form.nombre" name="nombre"
                class="w-full px-4 py-2 border rounded-lg" />

            <!-- Email -->
            <input type="email" placeholder="Email" [(ngModel)]="form.email" name="email"
                class="w-full px-4 py-2 border rounded-lg" />

            <!-- Rol -->
            <select [(ngModel)]="form.rol" name="rol" class="w-full px-4 py-2 border rounded-lg">
                <option value="Vendedor">Vendedor</option>
                <option value="Supervisor">Supervisor</option>
                <option value="Administrador">Administrador</option>
            </select>

            <!-- Estado -->
            <select [(ngModel)]="form.estado" name="estado" class="w-full px-4 py-2 border rounded-lg">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>

            <!-- Actions -->
            <div class="flex justify-end gap-4 mt-6">

                <button type="button" (click)="cancel()" class="px-4 py-2 border rounded-lg">
                    Cancelar
                </button>

                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg">
                    Guardar cambios
                </button>

            </div>

        </form>

    </div>

</div>
