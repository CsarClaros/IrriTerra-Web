<div class="space-y-6">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-3xl mb-2">Productos</h1>
            <p class="text-gray-600">
                Gestión de productos e inventario
            </p>
        </div>

        <button (click)="openCreate()"
            class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors inline-flex items-center">
            <!-- lucide-angular icon -->
            <lucide-icon [img]="User" class="w-5 h-5 mr-2"></lucide-icon>
            Crear producto
        </button>

        @if (showModal) {
        <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

            <!-- CONTENEDOR DEL MODAL -->
            <div class="bg-white w-full max-w-2xl rounded-xl shadow-xl p-6 relative">

                <!-- Botón cerrar -->
                <button class="absolute top-3 right-3 text-gray-500 hover:text-black" (click)="closeModal()">
                    ✕
                </button>

                <!-- TU COMPONENTE -->
                <app-product-create (close)="closeModal()">
                </app-product-create>

            </div>
        </div>
        }
    </div>

    <!-- Alert -->
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-6">
        <div class="flex items-start space-x-3">

            <lucide-icon [img]="User" class="w-6 h-6 text-yellow-600 mt-0.5"></lucide-icon>

            <div>
                <h3 class="mb-2 text-yellow-900">
                    Alertas de Stock Bajo
                </h3>
                <p class="text-yellow-800">
                    2 productos tienen stock bajo
                </p>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="overflow-x-auto">

            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs uppercase text-gray-500">Imagen</th>
                        <th class="px-6 py-3 text-left text-xs uppercase text-gray-500">Nombre</th>
                        <th class="px-6 py-3 text-left text-xs uppercase text-gray-500">Categoría</th>
                        <th class="px-6 py-3 text-left text-xs uppercase text-gray-500">Precio</th>
                        <th class="px-6 py-3 text-left text-xs uppercase text-gray-500">Stock</th>
                        <th class="px-6 py-3 text-left text-xs uppercase text-gray-500">Estado</th>
                        <th class="px-6 py-3 text-left text-xs uppercase text-gray-500">Acciones</th>
                    </tr>
                </thead>

                <tbody class="divide-y divide-gray-200">
                    <tr *ngFor="let producto of productos" class="hover:bg-gray-50">

                        <td class="px-6 py-4">
                            <img *ngIf="producto.imagen" [src]="producto.imagen"
                                class="w-16 h-16 object-cover rounded-lg" />
                        </td>

                        <td class="px-6 py-4">{{ producto.nombre }}</td>
                        <td class="px-6 py-4">{{ producto.categoria }}</td>
                        <td class="px-6 py-4">Bs. {{ producto.precio }}</td>

                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-sm"
                                [ngClass]="producto.stock < 15 ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'">
                                {{ producto.stock }} unidades
                            </span>
                        </td>

                        <td class="px-6 py-4">
                            <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm">
                                Activo
                            </span>
                        </td>

                        <td class="px-6 py-4">
                            <div class="flex items-center space-x-2">

                                <button class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg">
                                    <lucide-icon [img]="User" class="w-4 h-4"></lucide-icon>
                                </button>

                                <button (click)="deleteProduct(producto.id)"
                                    class="p-2 text-red-600 hover:bg-red-50 rounded-lg">
                                    <lucide-icon [img]="User" class="w-4 h-4"></lucide-icon>
                                </button>

                            </div>
                        </td>

                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>
